name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  test-and-gate:
    name: Test And Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run core tests
        run: |
          cargo test -p memd
          cargo test -p memd-evals

      - name: Run MCP conformance
        run: cargo run -p memd-evals -- --suite mcp --skip-build

      - name: Run offline benchmark smoke gate
        run: |
          cargo run -p memd-evals -- --suite benchmark --skip-build \
            --dataset-path evals/datasets/retrieval/code_pairs.json \
            --bootstrap-iterations 200 \
            --seed 42 \
            --threshold-recall 0.8 \
            --threshold-mrr 0.6 \
            --report-json /tmp/memd-benchmark-smoke.json
