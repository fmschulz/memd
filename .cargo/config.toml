# Local cargo config - overrides global ~/.cargo/config.toml
# Fixes ONNX Runtime + mold linker compatibility issue
# Using default system linker (ld) instead of mold

[target.x86_64-unknown-linux-gnu]
# Use default system linker (no special linker specified)
linker = "cc"

# Keep other settings from global config
[build]
jobs = 64

[registries.crates-io]
protocol = "sparse"

[net]
git-fetch-with-cli = true
retry = 3
